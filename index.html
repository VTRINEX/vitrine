<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTRINEX - As Melhores Ofertas</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E40AF', // Azul escuro premium
                        secondary: '#F59E0B', // Laranja para botões de compra
                        dark: '#111827',
                        light: '#F3F4F6'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; margin: 0; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .admin-nav-item.active { background-color: #DBEAFE; color: #1E40AF; font-weight: 600; border-left: 4px solid #1E40AF; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Inicialização do Firebase providenciada pelo ambiente
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vtrinex-default';

        window.firebaseApp = app;
        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.firebaseAppId = appId;
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- MOCK DATA INICIAL (Caso Firebase falhe ou esteja vazio) ---
        const DEFAULT_CATEGORIES = [
            { id: '1', name: 'Eletrônicos', slug: 'eletronicos', icon: 'ph-desktop' },
            { id: '2', name: 'Celulares', slug: 'celulares', icon: 'ph-device-mobile' },
            { id: '3', name: 'Casa', slug: 'casa', icon: 'ph-house' },
            { id: '4', name: 'Moda', slug: 'moda', icon: 'ph-t-shirt' }
        ];

        // --- FUNÇÕES UTILITÁRIAS ---
        const formatPrice = (price) => {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(price);
        };

        const generateSlug = (text) => {
            return text.toString().toLowerCase()
                .replace(/\s+/g, '-')           // Substitui espaços por -
                .replace(/[^\w\-]+/g, '')       // Remove todos os caracteres não-palavra
                .replace(/\-\-+/g, '-')         // Substitui múltiplos - por um único -
                .replace(/^-+/, '')             // Apara - do início
                .replace(/-+$/, '');            // Apara - do fim
        };

        // --- COMPONENTES PÚBLICOS ---

        const Header = ({ onNavigate, onSearch, cartCount = 0 }) => (
            <header className="bg-white shadow-sm sticky top-0 z-50">
                <div className="container mx-auto px-4 py-3 flex items-center justify-between">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => onNavigate('home')}>
                        <div className="bg-primary text-white p-1.5 rounded-lg">
                            <i className="ph-bold ph-shopping-bag text-xl"></i>
                        </div>
                        <h1 className="text-2xl font-bold text-dark tracking-tight">VTRINEX</h1>
                    </div>
                    
                    <div className="hidden md:flex flex-1 max-w-md mx-8 relative">
                        <input 
                            type="text" 
                            placeholder="Buscar ofertas..." 
                            className="w-full bg-gray-100 rounded-full py-2 pl-4 pr-10 outline-none focus:ring-2 focus:ring-primary/50 transition-all"
                            onChange={(e) => onSearch(e.target.value)}
                        />
                        <i className="ph ph-magnifying-glass absolute right-4 top-2.5 text-gray-500 text-lg"></i>
                    </div>

                    <div className="flex items-center gap-4">
                        <button className="md:hidden text-gray-700 p-2" onClick={() => alert('Abrir busca mobile')}>
                            <i className="ph ph-magnifying-glass text-2xl"></i>
                        </button>
                        <button className="text-gray-700 p-2 hover:bg-gray-100 rounded-full transition-colors" onClick={() => onNavigate('admin-login')}>
                            <i className="ph ph-user text-2xl"></i>
                        </button>
                    </div>
                </div>
            </header>
        );

        const Banner = () => (
            <div className="bg-gradient-to-r from-primary to-blue-800 text-white py-12 px-4 mb-8">
                <div className="container mx-auto max-w-4xl text-center">
                    <h2 className="text-3xl md:text-5xl font-bold mb-4">Descubra as Melhores Ofertas</h2>
                    <p className="text-blue-100 mb-8 text-lg">Curadoria exclusiva dos produtos mais desejados da internet.</p>
                    <button className="bg-secondary text-white font-semibold py-3 px-8 rounded-full hover:bg-orange-500 transition-colors shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                        Ver Promoções
                    </button>
                </div>
            </div>
        );

        const CategoryNav = ({ categories, selectedCategory, onSelectCategory }) => (
            <div className="container mx-auto px-4 mb-8">
                <h3 className="text-lg font-semibold mb-4 text-gray-800">Categorias</h3>
                <div className="flex gap-4 overflow-x-auto hide-scrollbar pb-2">
                    <button 
                        onClick={() => onSelectCategory(null)}
                        className={`flex flex-col items-center min-w-[80px] p-3 rounded-xl border transition-all ${!selectedCategory ? 'border-primary bg-blue-50 text-primary' : 'border-gray-200 bg-white text-gray-600 hover:border-gray-300'}`}
                    >
                        <i className="ph ph-squares-four text-2xl mb-1"></i>
                        <span className="text-xs font-medium">Todas</span>
                    </button>
                    {categories.map(cat => (
                        <button 
                            key={cat.id}
                            onClick={() => onSelectCategory(cat.slug)}
                            className={`flex flex-col items-center min-w-[80px] p-3 rounded-xl border transition-all ${selectedCategory === cat.slug ? 'border-primary bg-blue-50 text-primary' : 'border-gray-200 bg-white text-gray-600 hover:border-gray-300'}`}
                        >
                            <i className={`ph ${cat.icon || 'ph-tag'} text-2xl mb-1`}></i>
                            <span className="text-xs font-medium">{cat.name}</span>
                        </button>
                    ))}
                </div>
            </div>
        );

        const ProductCard = ({ product, onViewProduct }) => (
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow cursor-pointer flex flex-col" onClick={() => onViewProduct(product)}>
                <div className="relative aspect-square bg-gray-50 flex items-center justify-center overflow-hidden group">
                    {product.badge && (
                        <span className="absolute top-2 left-2 bg-red-500 text-white text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider z-10">
                            {product.badge}
                        </span>
                    )}
                    <img 
                        src={product.imageUrl || 'https://via.placeholder.com/300?text=Sem+Imagem'} 
                        alt={product.name}
                        className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                        onError={(e) => { e.target.src = 'https://via.placeholder.com/300?text=Erro+na+Imagem' }}
                    />
                </div>
                <div className="p-4 flex flex-col flex-1">
                    <p className="text-xs text-gray-500 mb-1 uppercase tracking-wide">{product.category}</p>
                    <h3 className="font-medium text-gray-800 text-sm mb-2 line-clamp-2 h-10">{product.name}</h3>
                    <div className="mt-auto">
                        <div className="flex items-baseline gap-2 mb-3">
                            <span className="text-lg font-bold text-primary">{formatPrice(product.price)}</span>
                            {product.oldPrice && (
                                <span className="text-xs text-gray-400 line-through">{formatPrice(product.oldPrice)}</span>
                            )}
                        </div>
                        <button className="w-full bg-secondary hover:bg-orange-500 text-white font-medium py-2 rounded-lg transition-colors flex items-center justify-center gap-2 text-sm">
                            <i className="ph-bold ph-shopping-cart"></i>
                            Ver Oferta
                        </button>
                    </div>
                </div>
            </div>
        );

        const ProductDetail = ({ product, onBack }) => {
            if (!product) return null;

            const handleBuyClick = () => {
                if (product.affiliateLink) {
                    window.open(product.affiliateLink, '_blank', 'noopener,noreferrer');
                } else {
                    alert('Link de compra não configurado.');
                }
            };

            return (
                <div className="bg-white min-h-screen pb-20">
                    <div className="sticky top-0 bg-white z-40 p-4 border-b flex items-center gap-4">
                        <button onClick={onBack} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200">
                            <i className="ph-bold ph-arrow-left"></i>
                        </button>
                        <h2 className="font-semibold text-lg truncate">Detalhes do Produto</h2>
                    </div>

                    <div className="md:container md:mx-auto md:px-4 md:py-8 max-w-4xl">
                        <div className="grid md:grid-cols-2 gap-8">
                            {/* Imagem */}
                            <div className="aspect-square bg-gray-50 w-full md:rounded-2xl overflow-hidden relative">
                                {product.badge && (
                                    <span className="absolute top-4 left-4 bg-red-500 text-white text-xs font-bold px-3 py-1 rounded uppercase tracking-wider z-10">
                                        {product.badge}
                                    </span>
                                )}
                                <img 
                                    src={product.imageUrl || 'https://via.placeholder.com/600?text=Sem+Imagem'} 
                                    alt={product.name}
                                    className="w-full h-full object-contain"
                                />
                            </div>

                            {/* Info */}
                            <div className="p-4 md:p-0 flex flex-col">
                                <span className="text-sm text-primary font-medium mb-2">{product.category}</span>
                                <h1 className="text-2xl md:text-3xl font-bold text-gray-900 mb-4">{product.name}</h1>
                                
                                <div className="flex items-center gap-3 mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                                    <span className="text-3xl font-bold text-primary">{formatPrice(product.price)}</span>
                                    {product.oldPrice && (
                                        <span className="text-lg text-gray-400 line-through">{formatPrice(product.oldPrice)}</span>
                                    )}
                                </div>

                                <button 
                                    onClick={handleBuyClick}
                                    className="w-full bg-secondary hover:bg-orange-500 text-white font-bold py-4 rounded-xl text-lg shadow-lg shadow-orange-200 transition-all transform hover:-translate-y-1 mb-8 flex items-center justify-center gap-2"
                                >
                                    <i className="ph-fill ph-shopping-bag text-2xl"></i>
                                    Comprar Agora
                                </button>

                                <div>
                                    <h3 className="font-semibold text-lg mb-2 border-b pb-2">Descrição</h3>
                                    <div className="text-gray-600 text-sm leading-relaxed whitespace-pre-line">
                                        {product.description || 'Nenhuma descrição fornecida para este produto.'}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Footer = () => (
            <footer className="bg-dark text-gray-300 py-8 mt-12">
                <div className="container mx-auto px-4 text-center">
                    <div className="flex justify-center items-center gap-2 mb-4">
                        <div className="bg-primary text-white p-1 rounded">
                            <i className="ph-bold ph-shopping-bag text-lg"></i>
                        </div>
                        <h2 className="text-xl font-bold text-white tracking-tight">VTRINEX</h2>
                    </div>
                    <p className="text-sm mb-6">As melhores ofertas da internet em um só lugar.</p>
                    <div className="flex justify-center gap-4 text-sm text-gray-400 mb-6">
                        <a href="#" className="hover:text-white transition-colors">Termos</a>
                        <a href="#" className="hover:text-white transition-colors">Privacidade</a>
                        <a href="#" className="hover:text-white transition-colors">Contato</a>
                    </div>
                    <p className="text-xs text-gray-500">© 2026 VTRINEX - Todos os direitos reservados.</p>
                    <p className="text-[10px] text-gray-600 mt-2">Aviso de Afiliado: Recebemos comissões por compras feitas através dos nossos links.</p>
                </div>
            </footer>
        );

        // --- COMPONENTES ADMINISTRATIVOS ---

        const AdminLogin = ({ onLoginSuccess, onBack }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                
                try {
                    // Tenta login com Firebase Auth
                    const { signInWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                    await signInWithEmailAndPassword(window.firebaseAuth, email, password);
                    onLoginSuccess();
                } catch (err) {
                    console.error("Erro auth:", err);
                    // Fallback para login "hardcoded" apenas para demonstração se Firebase falhar
                    if (email === 'admin@vtrinex.com' && password === 'admin123') {
                        onLoginSuccess(true); // true indica login mockado
                    } else {
                        setError('Credenciais inválidas ou erro no servidor.');
                    }
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-gray-100 flex flex-col justify-center items-center p-4">
                    <button onClick={onBack} className="absolute top-4 left-4 text-gray-500 flex items-center gap-1 hover:text-dark">
                        <i className="ph-bold ph-arrow-left"></i> Voltar ao site
                    </button>
                    <div className="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden">
                        <div className="bg-dark p-6 text-center">
                            <h2 className="text-2xl font-bold text-white mb-1">Painel VTRINEX</h2>
                            <p className="text-gray-400 text-sm">Acesso restrito</p>
                        </div>
                        <div className="p-8">
                            {error && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4 border border-red-200">{error}</div>}
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">E-mail Administrativo</label>
                                    <input 
                                        type="email" 
                                        required
                                        className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none"
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        placeholder="admin@exemplo.com"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                                    <input 
                                        type="password" 
                                        required
                                        className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                    />
                                </div>
                                <button 
                                    type="submit" 
                                    disabled={loading}
                                    className={`w-full bg-primary text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-colors ${loading ? 'opacity-70' : ''}`}
                                >
                                    {loading ? 'Autenticando...' : 'Entrar no Painel'}
                                </button>
                            </form>
                            <p className="text-xs text-gray-400 text-center mt-6">Para testes, se o Firebase não estiver configurado, use: admin@vtrinex.com / admin123</p>
                        </div>
                    </div>
                </div>
            );
        };

        const AdminLayout = ({ children, currentView, onViewChange, onLogout }) => {
            const [sidebarOpen, setSidebarOpen] = useState(false);

            const navItems = [
                { id: 'dashboard', label: 'Dashboard', icon: 'ph-squares-four' },
                { id: 'products', label: 'Produtos', icon: 'ph-package' },
                { id: 'categories', label: 'Categorias', icon: 'ph-tags' },
                { id: 'settings', label: 'Configurações', icon: 'ph-gear' }
            ];

            return (
                <div className="min-h-screen bg-gray-50 flex">
                    {/* Sidebar Mobile Overlay */}
                    {sidebarOpen && (
                        <div className="fixed inset-0 bg-black/50 z-40 md:hidden" onClick={() => setSidebarOpen(false)}></div>
                    )}

                    {/* Sidebar */}
                    <aside className={`fixed md:sticky top-0 h-screen w-64 bg-white border-r z-50 transform transition-transform duration-300 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="p-4 border-b flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="bg-dark text-white p-1 rounded">
                                    <i className="ph-bold ph-shield-check"></i>
                                </div>
                                <span className="font-bold text-lg text-dark">Admin</span>
                            </div>
                            <button className="md:hidden text-gray-500" onClick={() => setSidebarOpen(false)}>
                                <i className="ph-bold ph-x text-xl"></i>
                            </button>
                        </div>
                        <nav className="p-4 space-y-1">
                            {navItems.map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => { onViewChange(item.id); setSidebarOpen(false); }}
                                    className={`w-full flex items-center gap-3 p-3 rounded-lg text-left transition-colors admin-nav-item ${currentView === item.id ? 'active' : 'text-gray-600 hover:bg-gray-100'}`}
                                >
                                    <i className={`ph ${item.icon} text-xl`}></i>
                                    <span className="font-medium">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="absolute bottom-0 left-0 right-0 p-4 border-t">
                            <button onClick={onLogout} className="w-full flex items-center gap-3 p-3 text-red-600 hover:bg-red-50 rounded-lg transition-colors font-medium">
                                <i className="ph-bold ph-sign-out text-xl"></i>
                                Sair
                            </button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col min-w-0">
                        <header className="bg-white border-b p-4 flex items-center gap-4 sticky top-0 z-30">
                            <button className="md:hidden text-gray-600" onClick={() => setSidebarOpen(true)}>
                                <i className="ph-bold ph-list text-2xl"></i>
                            </button>
                            <h2 className="font-bold text-xl text-gray-800 capitalize">{navItems.find(i => i.id === currentView)?.label || 'Painel'}</h2>
                            <div className="ml-auto">
                                <a href="#" onClick={(e) => { e.preventDefault(); window.location.reload(); }} className="text-sm text-primary hover:underline font-medium flex items-center gap-1">
                                    <i className="ph ph-eye"></i> Ver Site
                                </a>
                            </div>
                        </header>
                        <div className="p-4 md:p-6 flex-1 overflow-y-auto">
                            {children}
                        </div>
                    </main>
                </div>
            );
        };

        const AdminDashboard = ({ products }) => {
            const stats = [
                { label: 'Total de Produtos', value: products.length, icon: 'ph-package', color: 'bg-blue-500' },
                { label: 'Produtos Ativos', value: products.filter(p => p.active !== false).length, icon: 'ph-check-circle', color: 'bg-green-500' },
                { label: 'Em Destaque', value: products.filter(p => p.featured).length, icon: 'ph-star', color: 'bg-yellow-500' },
                { label: 'Sem Link', value: products.filter(p => !p.affiliateLink).length, icon: 'ph-link-break', color: 'bg-red-500' }
            ];

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        {stats.map((stat, i) => (
                            <div key={i} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                                <div className={`w-10 h-10 rounded-lg flex items-center justify-center text-white mb-3 ${stat.color}`}>
                                    <i className={`ph-fill ${stat.icon} text-xl`}></i>
                                </div>
                                <span className="text-2xl font-bold text-gray-800">{stat.value}</span>
                                <span className="text-xs text-gray-500 uppercase font-medium">{stat.label}</span>
                            </div>
                        ))}
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div className="p-4 border-b">
                            <h3 className="font-bold text-gray-800">Adicionados Recentemente</h3>
                        </div>
                        <div className="divide-y">
                            {products.slice(0, 5).map(product => (
                                <div key={product.id} className="p-4 flex items-center gap-4 hover:bg-gray-50">
                                    <img src={product.imageUrl || 'https://via.placeholder.com/50'} className="w-12 h-12 rounded object-cover border" />
                                    <div className="flex-1 min-w-0">
                                        <p className="font-medium text-sm text-gray-900 truncate">{product.name}</p>
                                        <p className="text-xs text-gray-500">{product.category}</p>
                                    </div>
                                    <span className="text-sm font-bold text-primary">{formatPrice(product.price)}</span>
                                </div>
                            ))}
                            {products.length === 0 && (
                                <div className="p-8 text-center text-gray-500">Nenhum produto cadastrado ainda.</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const AdminProducts = ({ products, categories, onSave, onDelete }) => {
            const [editingProduct, setEditingProduct] = useState(null);
            const [showForm, setShowForm] = useState(false);

            const handleEdit = (product) => {
                setEditingProduct(product);
                setShowForm(true);
            };

            const handleAddNew = () => {
                setEditingProduct(null);
                setShowForm(true);
            };

            const handleCloseForm = () => {
                setShowForm(false);
                setEditingProduct(null);
            };

            if (showForm) {
                return <ProductForm 
                    initialData={editingProduct} 
                    categories={categories}
                    onSave={(data) => { onSave(data); handleCloseForm(); }} 
                    onCancel={handleCloseForm} 
                />;
            }

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100">
                    <div className="p-4 border-b flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <h3 className="font-bold text-gray-800">Gerenciar Produtos</h3>
                        <button onClick={handleAddNew} className="bg-primary text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 flex items-center gap-2 justify-center">
                            <i className="ph-bold ph-plus"></i> Novo Produto
                        </button>
                    </div>
                    
                    <div className="overflow-x-auto">
                        <table className="w-full text-left text-sm whitespace-nowrap">
                            <thead className="bg-gray-50 text-gray-600 font-medium">
                                <tr>
                                    <th className="p-4">Produto</th>
                                    <th className="p-4">Categoria</th>
                                    <th className="p-4">Preço</th>
                                    <th className="p-4">Status</th>
                                    <th className="p-4 text-right">Ações</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {products.map(product => (
                                    <tr key={product.id} className="hover:bg-gray-50">
                                        <td className="p-4 flex items-center gap-3 min-w-[250px]">
                                            <img src={product.imageUrl || 'https://via.placeholder.com/40'} className="w-10 h-10 rounded object-cover bg-gray-100 border" />
                                            <div>
                                                <p className="font-medium text-gray-800 truncate max-w-[200px]">{product.name}</p>
                                                {product.featured && <span className="text-[10px] bg-yellow-100 text-yellow-800 px-1.5 py-0.5 rounded font-bold">Destaque</span>}
                                            </div>
                                        </td>
                                        <td className="p-4 text-gray-600">{product.category}</td>
                                        <td className="p-4 font-medium">{formatPrice(product.price)}</td>
                                        <td className="p-4">
                                            <span className={`px-2 py-1 rounded text-xs font-medium ${product.active !== false ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                {product.active !== false ? 'Ativo' : 'Inativo'}
                                            </span>
                                        </td>
                                        <td className="p-4 text-right">
                                            <button onClick={() => handleEdit(product)} className="p-1.5 text-blue-600 hover:bg-blue-50 rounded mr-2">
                                                <i className="ph-bold ph-pencil-simple text-lg"></i>
                                            </button>
                                            <button onClick={() => { if(confirm('Excluir este produto?')) onDelete(product.id); }} className="p-1.5 text-red-600 hover:bg-red-50 rounded">
                                                <i className="ph-bold ph-trash text-lg"></i>
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                                {products.length === 0 && (
                                    <tr>
                                        <td colSpan="5" className="p-8 text-center text-gray-500">Nenhum produto encontrado.</td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const ProductForm = ({ initialData, categories, onSave, onCancel }) => {
            const [formData, setFormData] = useState(initialData || {
                name: '',
                category: categories[0]?.name || '',
                price: '',
                oldPrice: '',
                description: '',
                imageUrl: '',
                affiliateLink: '',
                badge: '',
                active: true,
                featured: false
            });

            const handleChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: type === 'checkbox' ? checked : value
                }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                // Simula salvamento processando números
                const dataToSave = {
                    ...formData,
                    price: parseFloat(formData.price) || 0,
                    oldPrice: formData.oldPrice ? parseFloat(formData.oldPrice) : null,
                    slug: formData.slug || generateSlug(formData.name)
                };
                onSave(dataToSave);
            };

            const badges = ['', 'Novo', 'Oferta', 'Mais Vendido', 'Recomendado', 'Black Friday'];

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4 md:p-6">
                    <div className="flex items-center justify-between mb-6 pb-4 border-b">
                        <h3 className="font-bold text-lg text-gray-800">{initialData ? 'Editar Produto' : 'Novo Produto'}</h3>
                        <button type="button" onClick={onCancel} className="text-gray-500 hover:text-gray-700">
                            <i className="ph-bold ph-x text-xl"></i>
                        </button>
                    </div>

                    <form onSubmit={handleSubmit} className="space-y-6">
                        <div className="grid md:grid-cols-2 gap-6">
                            <div className="md:col-span-2">
                                <label className="block text-sm font-medium text-gray-700 mb-1">Nome do Produto *</label>
                                <input required type="text" name="name" value={formData.name} onChange={handleChange} className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Categoria *</label>
                                <select required name="category" value={formData.category} onChange={handleChange} className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none bg-white">
                                    {categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                                </select>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Selo (Badge)</label>
                                <select name="badge" value={formData.badge} onChange={handleChange} className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none bg-white">
                                    <option value="">Nenhum selo</option>
                                    {badges.filter(b => b !== '').map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Preço Atual (R$) *</label>
                                <input required type="number" step="0.01" name="price" value={formData.price} onChange={handleChange} className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Preço Antigo (Opcional - Cortado)</label>
                                <input type="number" step="0.01" name="oldPrice" value={formData.oldPrice} onChange={handleChange} className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                            </div>

                            <div className="md:col-span-2">
                                <label className="block text-sm font-medium text-gray-700 mb-1">URL da Imagem Principal *</label>
                                <input required type="url" name="imageUrl" value={formData.imageUrl} onChange={handleChange} placeholder="https://..." className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                                {formData.imageUrl && (
                                    <div className="mt-2 p-2 border rounded-lg inline-block bg-gray-50">
                                        <img src={formData.imageUrl} alt="Preview" className="h-20 object-contain" onError={(e) => e.target.style.display = 'none'} />
                                    </div>
                                )}
                            </div>

                            <div className="md:col-span-2">
                                <label className="block text-sm font-medium text-gray-700 mb-1">Link de Afiliado (Destino do botão comprar) *</label>
                                <input required type="url" name="affiliateLink" value={formData.affiliateLink} onChange={handleChange} placeholder="https://amzn.to/..." className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                            </div>

                            <div className="md:col-span-2">
                                <label className="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
                                <textarea name="description" rows="4" value={formData.description} onChange={handleChange} className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none"></textarea>
                            </div>

                            <div className="md:col-span-2 flex flex-col sm:flex-row gap-4 p-4 bg-gray-50 rounded-lg border">
                                <label className="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" name="active" checked={formData.active} onChange={handleChange} className="w-5 h-5 text-primary rounded focus:ring-primary" />
                                    <span className="font-medium text-gray-700">Produto Ativo (Visível)</span>
                                </label>
                                <label className="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" name="featured" checked={formData.featured} onChange={handleChange} className="w-5 h-5 text-primary rounded focus:ring-primary" />
                                    <span className="font-medium text-gray-700">Destacar na Home</span>
                                </label>
                            </div>
                        </div>

                        <div className="flex gap-4 pt-4 border-t">
                            <button type="button" onClick={onCancel} className="flex-1 bg-gray-100 text-gray-700 font-bold py-3 rounded-lg hover:bg-gray-200 transition-colors">
                                Cancelar
                            </button>
                            <button type="submit" className="flex-1 bg-primary text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-colors">
                                Salvar Produto
                            </button>
                        </div>
                    </form>
                </div>
            );
        };

        // --- APP PRINCIPAL ---

        const App = () => {
            const [currentRoute, setCurrentRoute] = useState('home'); // home, product, admin-login, admin
            const [selectedProduct, setSelectedProduct] = useState(null);
            
            // Estado Global
            const [products, setProducts] = useState([]);
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
            const [searchTerm, setSearchTerm] = useState('');
            const [activeCategory, setActiveCategory] = useState(null);
            
            // Admin State
            const [adminUser, setAdminUser] = useState(null);
            const [adminView, setAdminView] = useState('dashboard');
            const [isMockAdmin, setIsMockAdmin] = useState(false);
            const [dbInitialized, setDbInitialized] = useState(false);

            // Mock Data inicial
            const mockProducts = [
                { id: '1', name: 'Smartphone Super X 128GB Tela AMOLED', category: 'Celulares', price: 1499.99, oldPrice: 1899.99, imageUrl: 'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500&q=80', affiliateLink: '#', badge: 'Oferta', active: true, featured: true },
                { id: '2', name: 'Fone de Ouvido Bluetooth Pro com Cancelamento de Ruído', category: 'Eletrônicos', price: 299.90, imageUrl: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&q=80', affiliateLink: '#', badge: 'Mais Vendido', active: true, featured: true },
                { id: '3', name: 'Smartwatch Esportivo 40mm Resistente à Água', category: 'Eletrônicos', price: 199.00, oldPrice: 250.00, imageUrl: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500&q=80', affiliateLink: '#', active: true, featured: false },
                { id: '4', name: 'Câmera Mirrorless 4K Lente Kit', category: 'Eletrônicos', price: 3499.00, imageUrl: 'https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=500&q=80', affiliateLink: '#', badge: 'Novo', active: true, featured: true }
            ];

            // Setup Firebase ou Mock Data
            useEffect(() => {
                const initDb = async () => {
                    try {
                        const { collection, getDocs, onSnapshot, query } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                        const db = window.firebaseDb;
                        const appId = window.firebaseAppId;
                        
                        // Caminho padrão para Firestore (Rule 1)
                        const productsRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');
                        
                        // Tenta buscar dados para ver se funciona
                        const snapshot = await getDocs(productsRef);
                        
                        if (snapshot.empty) {
                            // Se vazio, usa mock temporário e marca que precisamos criar dados de teste no admin
                            setProducts(mockProducts);
                        } else {
                            // Configura listener real-time
                            onSnapshot(productsRef, (snap) => {
                                const items = [];
                                snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                                setProducts(items);
                            }, (err) => {
                                console.error("Erro no listener do firestore:", err);
                                setProducts(mockProducts); // Fallback silencioso
                            });
                        }
                        setDbInitialized(true);
                    } catch (error) {
                        console.log("Firebase não configurado ou erro. Usando dados locais.", error);
                        setProducts(mockProducts);
                        setDbInitialized(true);
                    }
                };

                initDb();
            }, []);

            // Lógica do Admin
            const handleLoginSuccess = (isMock = false) => {
                setIsMockAdmin(isMock);
                setAdminUser({ role: 'admin' });
                setCurrentRoute('admin');
            };

            const handleLogout = () => {
                setAdminUser(null);
                setCurrentRoute('home');
                try {
                    const { signOut } = require("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                    signOut(window.firebaseAuth);
                } catch(e) {}
            };

            const handleSaveProduct = async (productData) => {
                if (isMockAdmin) {
                    // Salva em memória apenas
                    if (productData.id) {
                        setProducts(products.map(p => p.id === productData.id ? productData : p));
                    } else {
                        setProducts([...products, { ...productData, id: Date.now().toString() }]);
                    }
                    alert("Produto salvo (Modo Teste - Dados serão perdidos ao atualizar a página)");
                    return;
                }

                try {
                    const { addDoc, updateDoc, doc, collection } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                    const db = window.firebaseDb;
                    const appId = window.firebaseAppId;
                    const productsRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');

                    if (productData.id) {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'products', productData.id);
                        const { id, ...dataToUpdate } = productData;
                        await updateDoc(docRef, dataToUpdate);
                    } else {
                        await addDoc(productsRef, productData);
                    }
                } catch (error) {
                    console.error("Erro ao salvar no Firestore:", error);
                    alert("Erro ao salvar. Verifique o console.");
                }
            };

            const handleDeleteProduct = async (productId) => {
                if (isMockAdmin) {
                    setProducts(products.filter(p => p.id !== productId));
                    return;
                }
                try {
                    const { deleteDoc, doc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                    await deleteDoc(doc(window.firebaseDb, 'artifacts', window.firebaseAppId, 'public', 'data', 'products', productId));
                } catch (error) {
                    console.error("Erro ao excluir no Firestore:", error);
                }
            };

            // Filtragem de Produtos (Home)
            const filteredProducts = useMemo(() => {
                let result = products.filter(p => p.active !== false); // Apenas ativos
                
                if (activeCategory) {
                    // Simples conversão de nome de categoria para slug para testar
                    result = result.filter(p => p.category.toLowerCase().includes(activeCategory.toLowerCase()));
                }
                
                if (searchTerm) {
                    const term = searchTerm.toLowerCase();
                    result = result.filter(p => p.name.toLowerCase().includes(term) || p.description?.toLowerCase().includes(term));
                }
                
                return result;
            }, [products, activeCategory, searchTerm]);

            // Renderização das Rotas
            if (currentRoute === 'admin-login') {
                return <AdminLogin onLoginSuccess={handleLoginSuccess} onBack={() => setCurrentRoute('home')} />;
            }

            if (currentRoute === 'admin' && adminUser) {
                return (
                    <AdminLayout currentView={adminView} onViewChange={setAdminView} onLogout={handleLogout}>
                        {adminView === 'dashboard' && <AdminDashboard products={products} />}
                        {adminView === 'products' && <AdminProducts products={products} categories={categories} onSave={handleSaveProduct} onDelete={handleDeleteProduct} />}
                        {adminView === 'categories' && <div className="p-8 text-center text-gray-500 bg-white rounded-xl">Gerenciamento de categorias em desenvolvimento.</div>}
                        {adminView === 'settings' && <div className="p-8 text-center text-gray-500 bg-white rounded-xl">Configurações gerais do sistema em desenvolvimento.</div>}
                    </AdminLayout>
                );
            }

            if (currentRoute === 'product' && selectedProduct) {
                return <ProductDetail product={selectedProduct} onBack={() => setCurrentRoute('home')} />;
            }

            // Rota Padrão: HOME Vitrine
            return (
                <div className="min-h-screen flex flex-col">
                    <Header onNavigate={setCurrentRoute} onSearch={setSearchTerm} />
                    
                    <main className="flex-1">
                        {!searchTerm && !activeCategory && <Banner />}
                        
                        <CategoryNav 
                            categories={categories} 
                            selectedCategory={activeCategory} 
                            onSelectCategory={setActiveCategory} 
                        />

                        <div className="container mx-auto px-4 mb-12">
                            <div className="flex justify-between items-end mb-6">
                                <h2 className="text-xl md:text-2xl font-bold text-gray-800">
                                    {searchTerm ? `Resultados para "${searchTerm}"` : (activeCategory ? 'Produtos na Categoria' : 'Ofertas em Destaque')}
                                </h2>
                            </div>
                            
                            {filteredProducts.length > 0 ? (
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 md:gap-6">
                                    {filteredProducts.map(product => (
                                        <ProductCard 
                                            key={product.id} 
                                            product={product} 
                                            onViewProduct={(p) => { setSelectedProduct(p); setCurrentRoute('product'); window.scrollTo(0,0); }} 
                                        />
                                    ))}
                                </div>
                            ) : (
                                <div className="text-center py-20 bg-white rounded-2xl border border-dashed border-gray-300">
                                    <i className="ph ph-package text-6xl text-gray-300 mb-4 inline-block"></i>
                                    <h3 className="text-lg font-medium text-gray-600">Nenhum produto encontrado.</h3>
                                    <p className="text-sm text-gray-400 mt-2">Tente buscar por outro termo ou limpe os filtros.</p>
                                    {(searchTerm || activeCategory) && (
                                        <button 
                                            onClick={() => { setSearchTerm(''); setActiveCategory(null); }}
                                            className="mt-4 px-6 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-full font-medium transition-colors"
                                        >
                                            Limpar Filtros
                                        </button>
                                    )}
                                </div>
                            )}
                        </div>
                    </main>

                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>') : ''; }
