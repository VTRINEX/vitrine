<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">💎 SELEÇÃO VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #09090b; color: #f3f4f6; }
        .glass { background: rgba(24, 24, 27, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="min-h-screen font-sans flex flex-col justify-between selection:bg-amber-500 selection:text-black">
    <div>
        <header class="glass sticky top-0 z-50 py-5 px-4 border-b border-zinc-800/80 shadow-2xl">
            <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="text-center md:text-left">
                    <h1 id="display-title" class="text-2xl md:text-3xl font-black tracking-wider bg-gradient-to-r from-amber-400 via-orange-400 to-yellow-500 bg-clip-text text-transparent">💎 SELEÇÃO VIP</h1>
                    <p id="display-subtitle" class="text-xs text-zinc-400 mt-0.5">As melhores ofertas da internet</p>
                </div>
                <div class="w-full md:w-80">
                    <input id="busca" type="text" placeholder="🔍 Buscar oferta ou categoria..." oninput="renderizar()" class="w-full bg-zinc-900/90 border border-zinc-700/60 rounded-2xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-amber-500 transition shadow-inner">
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-4 mt-6 mb-12">
            <div id="categorias" class="flex items-center gap-2 overflow-x-auto pb-4 scrollbar-none"></div>
            <div id="lista-produtos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mt-4"></div>
        </main>
    </div>

    <footer class="border-t border-zinc-800/80 bg-zinc-950/50 py-8 text-center text-xs text-zinc-500">
        <p id="footer-text">© 2026 Todos os direitos reservados.</p>
        <p class="mt-1 text-[10px] text-zinc-600">Os links desta vitrine redirecionam para lojas oficiais parceiras.</p>
    </footer>

    <script>
        let todosProdutos = [];
        let catAtiva = 'Todos';

        async function carregar() {
            const param = '?v=' + Date.now();
            try {
                const resCfg = await fetch('config.json' + param, { cache: 'no-store' });
                const cfg = await resCfg.json();
                document.getElementById('display-title').innerText = cfg.nomeSite || "💎 SELEÇÃO VIP";
                document.getElementById('display-subtitle').innerText = cfg.subtitulo || "Ofertas exclusivas";
                document.getElementById('footer-text').innerText = `© ${new Date().getFullYear()} ${cfg.direitos || 'Vitrine VIP'}. Todos os direitos reservados.`;
            } catch(e) {}

            try {
                const res = await fetch('produtos.json' + param, { cache: 'no-store' });
                todosProdutos = await res.json();
                gerarCategorias();
                renderizar();
            } catch(e) {}
        }

        function gerarCategorias() {
            const cats = ['Todos', ...new Set(todosProdutos.map(p => p.categoria || 'Geral'))];
            document.getElementById('categorias').innerHTML = cats.map(c => `
                <button onclick="filtrarCat('${c}')" class="px-4 py-1.5 rounded-full text-xs font-bold transition whitespace-nowrap ${catAtiva === c ? 'bg-amber-500 text-zinc-950 shadow-lg shadow-amber-500/20 scale-105' : 'bg-zinc-900 text-zinc-300 border border-zinc-800 hover:border-zinc-600'}">${c}</button>
            `).join('');
        }

        function filtrarCat(c) { catAtiva = c; gerarCategorias(); renderizar(); }

        function renderizar() {
            const termo = document.getElementById('busca').value.toLowerCase();
            const filtrados = todosProdutos.filter(p => {
                const matchCat = catAtiva === 'Todos' || p.categoria === catAtiva;
                const matchBusca = p.nome.toLowerCase().includes(termo) || (p.categoria && p.categoria.toLowerCase().includes(termo));
                return matchCat && matchBusca;
            });

            const container = document.getElementById('lista-produtos');
            if (filtrados.length === 0) {
                container.innerHTML = '<p class="text-zinc-500 text-center col-span-3 py-16 text-sm font-semibold">Nenhuma oferta encontrada no momento.</p>';
                return;
            }

            container.innerHTML = filtrados.map(p => `
                <div class="glass rounded-3xl overflow-hidden flex flex-col justify-between transition duration-300 hover:scale-[1.01] hover:border-amber-500/40 shadow-xl group">
                    <div class="relative">
                        <img src="${p.imagem}" class="w-full h-52 object-cover group-hover:opacity-90 transition duration-500" alt="">
                        ${p.destaque ? `<span class="absolute top-3 left-3 bg-zinc-950/90 border border-amber-500/50 text-amber-400 text-[10px] font-extrabold px-3 py-1 rounded-full uppercase tracking-wider shadow-md">${p.destaque}</span>` : ''}
                        <span class="absolute bottom-3 right-3 bg-zinc-900/80 backdrop-blur-md text-zinc-300 text-[10px] px-2.5 py-0.5 rounded-lg border border-zinc-700">${p.categoria || 'Geral'}</span>
                    </div>
                    <div class="p-5 flex-1 flex flex-col justify-between">
                        <h2 class="text-base font-bold text-white leading-snug group-hover:text-amber-400 transition">${p.nome}</h2>
                        <div class="mt-5 pt-4 border-t border-zinc-800/60 flex items-end justify-between">
                            <div>
                                <span class="text-[10px] text-zinc-500 uppercase font-bold block">Preço Especial</span>
                                <p class="text-2xl font-black text-amber-400">R$ ${p.preco}</p>
                            </div>
                            <a href="${p.link}" target="_blank" rel="noopener noreferrer" class="bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-zinc-950 font-black px-5 py-2.5 rounded-2xl text-xs uppercase tracking-wider transition shadow-lg shadow-amber-500/10 active:scale-95">Pegar Oferta 🛍️</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        carregar();
    </script>
</body>
</html>
