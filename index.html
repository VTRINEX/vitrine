<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTRINEX - As Melhores Ofertas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#1E40AF', secondary: '#F59E0B', dark: '#111827', light: '#F3F4F6' }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; margin: 0; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const DEFAULT_CATEGORIES = [
            { id: '1', name: 'Eletrônicos', slug: 'eletronicos', icon: 'ph-desktop' },
            { id: '2', name: 'Celulares', slug: 'celulares', icon: 'ph-device-mobile' },
            { id: '3', name: 'Casa', slug: 'casa', icon: 'ph-house' },
            { id: '4', name: 'Moda', slug: 'moda', icon: 'ph-t-shirt' }
        ];

        const formatPrice = (price) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(price);

        const Footer = () => (
            <footer className="bg-dark text-gray-300 py-10 mt-auto border-t border-gray-800">
                <div className="container mx-auto px-4 text-center">
                    <div className="flex justify-center items-center gap-2 mb-6">
                        <div className="bg-primary text-white p-1.5 rounded-lg"><i className="ph-bold ph-shopping-bag text-xl"></i></div>
                        <h2 className="text-2xl font-bold text-white tracking-tight">VTRINEX</h2>
                    </div>
                    <div className="max-w-2xl mx-auto mb-6 p-4 bg-gray-800/50 rounded-xl border border-gray-700">
                        <p className="text-xs text-gray-400 leading-relaxed text-justify md:text-center">
                            <strong>Aviso de Transparência e Afiliados:</strong> O VTRINEX atua como uma vitrine de curadoria de produtos. Participamos de programas de afiliados e podemos receber uma comissão caso você realize uma compra através dos nossos links. Isso não altera o preço final do produto para você. Os preços e a disponibilidade dos produtos estão sujeitos a alterações sem aviso prévio.
                        </p>
                    </div>
                    <p className="text-sm font-medium text-gray-500">© 2026 VTRINEX - Todos os direitos reservados.</p>
                </div>
            </footer>
        );

        const App = () => {
            const [products, setProducts] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [activeCategory, setActiveCategory] = useState(null);

            useEffect(() => {
                fetch('produtos.json?v=' + new Date().getTime())
                    .then(res => res.json())
                    .then(data => setProducts(data))
                    .catch(err => console.log("Vitrine vazia", err));
            }, []);

            const filteredProducts = useMemo(() => {
                let result = products;
                if (activeCategory) result = result.filter(p => p.category.toLowerCase().includes(activeCategory.toLowerCase()));
                if (searchTerm) result = result.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()));
                return result;
            }, [products, activeCategory, searchTerm]);

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white shadow-sm sticky top-0 z-50">
                        <div className="container mx-auto px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => {setSearchTerm(''); setActiveCategory(null);}}>
                                <div className="bg-primary text-white p-1.5 rounded-lg"><i className="ph-bold ph-shopping-bag text-xl"></i></div>
                                <h1 className="text-2xl font-bold text-dark tracking-tight">VTRINEX</h1>
                            </div>
                            <div className="hidden md:flex flex-1 max-w-md mx-8 relative">
                                <input type="text" placeholder="Buscar ofertas..." className="w-full bg-gray-100 rounded-full py-2 pl-4 pr-10 outline-none" onChange={(e) => setSearchTerm(e.target.value)} />
                                <i className="ph ph-magnifying-glass absolute right-4 top-2.5 text-gray-500 text-lg"></i>
                            </div>
                            <div className="flex items-center gap-4">
                                {/* Stealth mode ativado */}
                            </div>
                        </div>
                    </header>
                    
                    <main className="flex-1">
                        {!searchTerm && !activeCategory && (
                            <div className="bg-gradient-to-r from-primary to-blue-800 text-white py-12 px-4 mb-8 text-center">
                                <h2 className="text-3xl md:text-5xl font-bold mb-4">Descubra as Melhores Ofertas</h2>
                                <p className="text-blue-100 text-lg">Curadoria exclusiva dos produtos mais desejados da internet.</p>
                            </div>
                        )}
                        
                        <div className="container mx-auto px-4 mb-8 mt-6">
                            <div className="flex gap-4 overflow-x-auto hide-scrollbar pb-2">
                                <button onClick={() => setActiveCategory(null)} className={`flex flex-col items-center min-w-[80px] p-3 rounded-xl border ${!activeCategory ? 'border-primary bg-blue-50 text-primary' : 'bg-white text-gray-600'}`}>
                                    <i className="ph ph-squares-four text-2xl mb-1"></i><span className="text-xs font-medium">Todas</span>
                                </button>
                                {DEFAULT_CATEGORIES.map(cat => (
                                    <button key={cat.id} onClick={() => setActiveCategory(cat.slug)} className={`flex flex-col items-center min-w-[80px] p-3 rounded-xl border ${activeCategory === cat.slug ? 'border-primary bg-blue-50 text-primary' : 'bg-white text-gray-600'}`}>
                                        <i className={`ph ${cat.icon} text-2xl mb-1`}></i><span className="text-xs font-medium">{cat.name}</span>
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="container mx-auto px-4 mb-12">
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-6">
                                {filteredProducts.map(product => (
                                    <div key={product.id} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col relative">
                                        {product.badge && <span className="absolute top-2 left-2 bg-red-500 text-white text-[10px] font-bold px-2 py-1 rounded z-10">{product.badge}</span>}
                                        <img src={product.imageUrl} alt={product.name} className="w-full aspect-square object-cover bg-gray-50" onError={(e) => { e.target.src = 'https://via.placeholder.com/300?text=Sem+Imagem' }}/>
                                        <div className="p-4 flex flex-col flex-1">
                                            <p className="text-xs text-gray-500 mb-1 uppercase">{product.category}</p>
                                            <h3 className="font-medium text-gray-800 text-sm mb-2 line-clamp-2 h-10">{product.name}</h3>
                                            <div className="mt-auto">
                                                <span className="text-lg font-bold text-primary block mb-3">{formatPrice(product.price)}</span>
                                                <a href={product.affiliateLink} target="_blank" className="w-full bg-secondary hover:bg-orange-500 text-white font-medium py-2 rounded-lg flex items-center justify-center gap-2 text-sm">
                                                    <i className="ph-bold ph-shopping-cart"></i> Comprar
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                    <Footer />
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
